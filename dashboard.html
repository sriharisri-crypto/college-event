<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – CampusConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
/* ===== CSS Variables ===== */
:root {
  --primary: #f97316;
  --primary-dark: #ea580c;
  --primary-light: #fed7aa;
  --accent: #0ea5e9;
  --dark: #0f172a;
  --dark2: #1e293b;
  --dark3: #334155;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --card-bg: #1e293b;
  --border: #334155;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --transition: 0.25s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
}

/* ===== AUTH PAGE ===== */
.auth-page {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}

.bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
}
.orb1 { width: 500px; height: 500px; background: var(--primary); top: -150px; left: -150px; }
.orb2 { width: 400px; height: 400px; background: var(--accent); bottom: -100px; right: -100px; }
.orb3 { width: 300px; height: 300px; background: #8b5cf6; top: 50%; left: 50%; transform: translate(-50%,-50%); }

.auth-container {
  position: relative;
  z-index: 1;
  background: rgba(30, 41, 59, 0.8);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2.5rem;
  width: 100%;
  max-width: 460px;
  box-shadow: var(--shadow);
}

.brand { text-align: center; margin-bottom: 2rem; }
.brand-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--primary), #fbbf24);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem;
  margin: 0 auto 1rem;
  box-shadow: 0 8px 24px rgba(249,115,22,0.4);
}
.brand h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: #fff; }
.brand p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem; }

.auth-tabs {
  display: flex;
  background: var(--dark);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 1.8rem;
}
.tab-btn {
  flex: 1;
  padding: 0.65rem;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 0.95rem;
  border-radius: 8px;
  cursor: pointer;
  transition: var(--transition);
}
.tab-btn.active { background: var(--primary); color: #fff; }

.form-section { display: none; }
.form-section.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.form-group { margin-bottom: 1.2rem; }
.form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.4rem; }

.input-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.input-wrap i.fa-envelope,
.input-wrap i.fa-lock,
.input-wrap i.fa-user,
.input-wrap i.fa-building {
  position: absolute;
  left: 1rem;
  color: var(--text-muted);
  font-size: 0.9rem;
}
.input-wrap input,
.input-wrap select {
  width: 100%;
  padding: 0.75rem 1rem 0.75rem 2.6rem;
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  transition: var(--transition);
  outline: none;
}
.input-wrap input:focus,
.input-wrap select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(249,115,22,0.15); }
.input-wrap select { appearance: none; }
.toggle-pw { position: absolute; right: 1rem; cursor: pointer; }

.form-footer-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.2rem;
}

.checkbox-label {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.88rem;
  color: var(--text-muted);
  cursor: pointer;
}
.checkbox-group { display: flex; flex-direction: column; gap: 0.5rem; }

.link { color: var(--primary); text-decoration: none; font-size: 0.88rem; }
.link:hover { text-decoration: underline; }

.btn-primary {
  width: 100%;
  padding: 0.85rem;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(249,115,22,0.4); }
.btn-primary.btn-sm { width: auto; padding: 0.5rem 1rem; font-size: 0.88rem; }

.btn-outline {
  padding: 0.7rem 1.5rem;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

.btn-outline-sm {
  padding: 0.4rem 0.9rem;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-muted);
  font-size: 0.82rem;
  cursor: pointer;
  transition: var(--transition);
}
.btn-outline-sm:hover { border-color: var(--primary); color: var(--primary); }

.error-msg { margin-top: 1rem; padding: 0.7rem 1rem; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; color: #fca5a5; font-size: 0.88rem; }
.success-msg { margin-top: 1rem; padding: 0.7rem 1rem; background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); border-radius: 8px; color: #86efac; font-size: 0.88rem; }
.hidden { display: none !important; }

.demo-hint { margin-top: 1rem; padding: 0.7rem; background: rgba(14,165,233,0.1); border-radius: 8px; font-size: 0.78rem; color: var(--text-muted); text-align: center; }
.demo-hint span { color: var(--accent); font-weight: 600; }

/* ===== COMMON COMPONENTS ===== */
.no-results {
  text-align: center;
  padding: 3rem;
  color: var(--text-muted);
}
.no-results i { font-size: 3rem; margin-bottom: 1rem; display: block; opacity: 0.4; }

/* Toggle Switch */
.toggle { position: relative; display: inline-block; width: 52px; height: 28px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; cursor: pointer; inset: 0;
  background: var(--dark3); border-radius: 28px;
  transition: 0.3s;
}
.slider:before {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  left: 4px; bottom: 4px;
  background: white; border-radius: 50%;
  transition: 0.3s;
}
.toggle input:checked + .slider { background: var(--primary); }
.toggle input:checked + .slider:before { transform: translateX(24px); }

/* Modal */
.modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
.modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
.modal-box {
  position: relative; z-index: 1;
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  max-width: 520px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  animation: fadeIn 0.2s ease;
}
.modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }

/* ===== LAYOUT ===== */
.dashboard-page { display: flex; min-height: 100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  background: var(--dark2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 200;
  transition: transform var(--transition);
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 1.5rem 1.5rem 1rem;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.15rem;
  color: #fff;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.5rem;
}
.sidebar-brand .brand-icon {
  width: 36px; height: 36px;
  font-size: 1rem;
  margin: 0;
  border-radius: 10px;
}
.sidebar-nav { flex: 1; padding: 0.5rem 0.75rem; display: flex; flex-direction: column; gap: 0.2rem; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.92rem;
  font-weight: 500;
  transition: var(--transition);
  position: relative;
}
.nav-item i { width: 20px; text-align: center; }
.nav-item:hover { background: var(--dark3); color: var(--text); }
.nav-item.active { background: rgba(249,115,22,0.15); color: var(--primary); }
.nav-item.active i { color: var(--primary); }
.badge {
  background: var(--primary);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  margin-left: auto;
}
.sidebar-footer { padding: 1rem; border-top: 1px solid var(--border); }
.logout-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.92rem;
  transition: var(--transition);
}
.logout-btn:hover { border-color: var(--danger); color: var(--danger); }

/* ===== MAIN CONTENT ===== */
.main-content {
  margin-left: 260px;
  flex: 1;
  padding: 0 2rem 2rem;
  min-height: 100vh;
}

/* ===== TOPBAR ===== */
.topbar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.5rem 0 1rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}
.menu-toggle { display: none; background: none; border: none; color: var(--text); font-size: 1.3rem; cursor: pointer; }
.topbar-greeting { flex: 1; }
.topbar-greeting h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.4rem; color: #fff; }
.topbar-greeting p { color: var(--text-muted); font-size: 0.88rem; margin-top: 0.2rem; }
.topbar-actions { display: flex; align-items: center; gap: 0.8rem; }
.icon-btn {
  position: relative;
  width: 40px; height: 40px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  transition: var(--transition);
}
.icon-btn:hover { border-color: var(--primary); }
.icon-btn .dot {
  position: absolute;
  top: 6px; right: 6px;
  width: 8px; height: 8px;
  background: var(--primary);
  border-radius: 50%;
  border: 2px solid var(--dark);
}
.avatar {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--primary), #fbbf24);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  color: #fff;
  cursor: pointer;
}
.admin-av { background: linear-gradient(135deg, #8b5cf6, #ec4899); }

/* ===== STATS ===== */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.4rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  transition: var(--transition);
}
.stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
.stat-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.stat-icon.orange { background: rgba(249,115,22,0.15); color: var(--primary); }
.stat-icon.green { background: rgba(34,197,94,0.15); color: var(--success); }
.stat-icon.blue { background: rgba(14,165,233,0.15); color: var(--accent); }
.stat-icon.purple { background: rgba(139,92,246,0.15); color: #8b5cf6; }
.stat-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; color: #fff; }
.stat-label { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.1rem; }

/* ===== SECTION ===== */
.section-block { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
.section-header h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; color: #fff; }
.view-all { font-size: 0.85rem; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }
.view-all:hover { text-decoration: underline; }

/* ===== EVENT CARDS ===== */
.events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
.event-card {
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
  cursor: pointer;
}
.event-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(249,115,22,0.15); }
.event-banner {
  height: 10px;
}
.event-banner.academic { background: linear-gradient(90deg, var(--accent), #6366f1); }
.event-banner.cultural { background: linear-gradient(90deg, #ec4899, #f43f5e); }
.event-banner.sports { background: linear-gradient(90deg, var(--success), #16a34a); }
.event-banner.workshop { background: linear-gradient(90deg, var(--warning), var(--primary)); }
.event-banner.social { background: linear-gradient(90deg, #8b5cf6, #a855f7); }
.event-body { padding: 1.2rem; }
.event-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
.event-cat {
  font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
  padding: 3px 10px; border-radius: 20px;
}
.event-cat.academic { background: rgba(14,165,233,0.15); color: var(--accent); }
.event-cat.cultural { background: rgba(236,72,153,0.15); color: #ec4899; }
.event-cat.sports { background: rgba(34,197,94,0.15); color: var(--success); }
.event-cat.workshop { background: rgba(249,115,22,0.15); color: var(--primary); }
.event-cat.social { background: rgba(139,92,246,0.15); color: #8b5cf6; }
.event-tag { font-size: 0.72rem; color: var(--text-muted); }
.event-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: #fff; margin-bottom: 0.5rem; line-height: 1.3; }
.event-info { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 1rem; }
.event-info span { font-size: 0.82rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; }
.event-info i { width: 14px; color: var(--primary); }
.event-footer { display: flex; align-items: center; justify-content: space-between; }
.seats-bar-wrap { flex: 1; margin-right: 1rem; }
.seats-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
.seats-bar { height: 4px; background: var(--dark3); border-radius: 4px; overflow: hidden; }
.seats-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.5s; }
.rsvp-btn {
  padding: 0.45rem 1rem;
  border: none;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.82rem;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.rsvp-btn.rsvp-yes { background: var(--primary); color: #fff; }
.rsvp-btn.rsvp-yes:hover { background: var(--primary-dark); }
.rsvp-btn.rsvp-done { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
.rsvp-btn.rsvp-done:hover { background: rgba(239,68,68,0.15); color: var(--danger); border-color: rgba(239,68,68,0.3); }
.rsvp-btn.rsvp-full { background: var(--dark3); color: var(--text-muted); cursor: not-allowed; }

/* ===== NOTIFICATIONS ===== */
.notif-list { display: flex; flex-direction: column; gap: 0.7rem; }
.notif-item {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  padding: 1rem;
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: var(--transition);
}
.notif-item.unread { border-left: 3px solid var(--primary); }
.notif-item:hover { border-color: var(--primary); }
.notif-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.notif-icon.event { background: rgba(249,115,22,0.15); color: var(--primary); }
.notif-icon.reminder { background: rgba(14,165,233,0.15); color: var(--accent); }
.notif-icon.broadcast { background: rgba(139,92,246,0.15); color: #8b5cf6; }
.notif-icon.rsvp { background: rgba(34,197,94,0.15); color: var(--success); }
.notif-content { flex: 1; }
.notif-title { font-weight: 600; font-size: 0.9rem; color: var(--text); }
.notif-body { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.2rem; }
.notif-time { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
.notif-full-list { display: flex; flex-direction: column; gap: 0.7rem; }

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.search-wrap i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
.search-wrap input {
  width: 100%;
  padding: 0.7rem 1rem 0.7rem 2.5rem;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  transition: var(--transition);
}
.search-wrap input:focus { border-color: var(--primary); }
.filter-pills { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.pill {
  padding: 0.45rem 1rem;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.pill:hover { border-color: var(--primary); color: var(--primary); }
.pill.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.rsvp-tabs { display: flex; gap: 0.5rem; }
#sortSelect, .search-sm {
  padding: 0.55rem 0.9rem;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.85rem;
  outline: none;
}

/* ===== PROFILE ===== */
.profile-card { display: flex; gap: 2rem; align-items: flex-start; flex-wrap: wrap; }
.profile-avatar-wrap { text-align: center; }
.profile-avatar {
  width: 100px; height: 100px;
  background: linear-gradient(135deg, var(--primary), #fbbf24);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2.5rem;
  color: #fff;
  margin-bottom: 0.8rem;
}
.profile-details { flex: 1; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.2rem; }
.form-grid .form-group.full-width { grid-column: 1 / -1; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 0.7rem 1rem;
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: var(--transition);
  margin-top: 0.3rem;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group input[readonly] { opacity: 0.5; cursor: not-allowed; }
.pref-list { display: flex; flex-direction: column; gap: 0.5rem; }
.pref-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem;
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.pref-item strong { font-size: 0.92rem; color: var(--text); }
.pref-item p { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }

/* ===== NOTIFICATION SIMULATOR ===== */
.notif-simulator { max-width: 560px; }
.notif-simulator textarea {
  width: 100%;
  padding: 0.7rem 1rem;
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  resize: vertical;
  transition: var(--transition);
  margin-top: 0.3rem;
}
.notif-simulator .btn-primary { width: auto; }

/* ===== RSVP Modal ===== */
.modal-event-title { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: 0.3rem; }
.modal-cat { display: inline-block; margin-bottom: 1rem; }
.modal-details { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.2rem; }
.modal-details span { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--text-muted); }
.modal-details i { color: var(--primary); width: 16px; }
.modal-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1.5rem; padding: 1rem; background: var(--dark); border-radius: 10px; }
.modal-actions { display: flex; gap: 0.8rem; }
.modal-actions .btn-primary { flex: 1; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; padding: 0 1rem 2rem; }
  .menu-toggle { display: block; }
  .form-grid { grid-template-columns: 1fr; }
  .profile-card { flex-direction: column; }
  .events-grid { grid-template-columns: 1fr; }
}


  </style>
</head>
<body class="dashboard-page">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-bolt"></i></div>
      <span>CampusConnect</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
      <a href="events.html" class="nav-item "><i class="fas fa-calendar-alt"></i> All Events</a>
      <a href="my-rsvps.html" class="nav-item "><i class="fas fa-ticket-alt"></i> My RSVPs</a>
      <a href="notifications.html" class="nav-item "><i class="fas fa-bell"></i> Notifications <span class="badge" id="notifBadge">3</span></a>
      <a href="profile.html" class="nav-item "><i class="fas fa-user"></i> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="topbar-greeting">
        <h2>Good <span id="timeGreeting">morning</span>, <span id="userName">Student</span>! 👋</h2>
        <p id="todayDate"></p>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="window.location.href='notifications.html'">
          <i class="fas fa-bell"></i><span class="dot"></span>
        </button>
        <div class="avatar" id="userAvatar">S</div>
      </div>
    </header>
    <section class="stats-row">
      <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-calendar-check"></i></div>
        <div><div class="stat-num" id="totalEvents">0</div><div class="stat-label">Total Events</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fas fa-ticket-alt"></i></div>
        <div><div class="stat-num" id="myRSVPs">0</div><div class="stat-label">My RSVPs</div></div></div>
      <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-star"></i></div>
        <div><div class="stat-num" id="upcomingCount">0</div><div class="stat-label">Upcoming</div></div></div>
      <div class="stat-card"><div class="stat-icon purple"><i class="fas fa-bell"></i></div>
        <div><div class="stat-num" id="notifCount">3</div><div class="stat-label">Notifications</div></div></div>
    </section>
    <section class="section-block">
      <div class="section-header">
        <h3>Upcoming Events</h3>
        <a href="events.html" class="view-all">View All <i class="fas fa-arrow-right"></i></a>
      </div>
      <div class="events-grid" id="upcomingEventsGrid"></div>
    </section>
    <section class="section-block">
      <div class="section-header">
        <h3>Recent Notifications</h3>
        <a href="notifications.html" class="view-all">View All <i class="fas fa-arrow-right"></i></a>
      </div>
      <div class="notif-list" id="recentNotifList"></div>
    </section>
  </div>
  <script>
// ============================================================
// data.js — Shared data store using localStorage
// ============================================================

// Default users
const DEFAULT_USERS = [
  { id: 1, name: 'Admin User', email: 'admin@college.edu', password: 'admin123', role: 'admin', dept: 'Administration', phone: '', notifEmail: true, notifSMS: false, notifBrowser: true, notifReminder: true },
  { id: 2, name: 'Sarah Johnson', email: 'student@college.edu', password: 'student123', role: 'student', dept: 'Computer Science', phone: '+1 555 0123', notifEmail: true, notifSMS: false, notifBrowser: true, notifReminder: true },
  { id: 3, name: 'Mike Chen', email: 'mike@college.edu', password: 'mike123', role: 'student', dept: 'Electrical Engineering', phone: '', notifEmail: true, notifSMS: true, notifBrowser: false, notifReminder: true },
];

// Default events
const DEFAULT_EVENTS = [
  { id: 1, title: 'Annual Tech Symposium 2025', category: 'academic', date: '2025-04-15', time: '10:00', venue: 'Auditorium A', seats: 200, rsvps: 0, description: 'Join us for the annual technology symposium featuring industry experts, research presentations, and networking opportunities. Topics include AI, cybersecurity, cloud computing, and more.', organizer: 'CS Department', tag: 'Free Entry' },
  { id: 2, title: 'Spring Cultural Fest', category: 'cultural', date: '2025-04-20', time: '14:00', venue: 'Open Amphitheater', seats: 500, rsvps: 0, description: 'A vibrant celebration of cultures featuring music, dance, art exhibitions, and traditional food stalls from around the world. Open to all students and faculty.', organizer: 'Cultural Club', tag: 'Open to All' },
  { id: 3, title: 'Inter-College Basketball Tournament', category: 'sports', date: '2025-04-22', time: '09:00', venue: 'Sports Complex', seats: 300, rsvps: 0, description: 'Cheer for your college team in this thrilling inter-college basketball championship. 12 teams competing over 2 days. Entry is free for college ID holders.', organizer: 'Sports Committee', tag: 'Free Entry' },
  { id: 4, title: 'Web Development Bootcamp', category: 'workshop', date: '2025-04-18', time: '11:00', venue: 'Lab 3, CS Building', seats: 40, rsvps: 0, description: 'A hands-on 4-hour bootcamp covering HTML, CSS, JavaScript, and React basics. Bring your laptop. Certificate provided on completion.', organizer: 'Tech Club', tag: 'Certificate' },
  { id: 5, title: 'Alumni Networking Night', category: 'social', date: '2025-04-25', time: '18:00', venue: 'Conference Hall B', seats: 150, rsvps: 0, description: 'Connect with successful alumni across industries. Great opportunity for internship leads, mentorship, and career advice. Formal attire recommended.', organizer: 'Alumni Association', tag: 'Registration Required' },
  { id: 6, title: 'Photography Exhibition', category: 'cultural', date: '2025-04-28', time: '10:00', venue: 'Art Gallery, Block D', seats: 1000, rsvps: 0, description: 'An exhibition of student photography showcasing campus life, nature, and abstract art. Open throughout the day. Best shots win prizes.', organizer: 'Photography Club', tag: 'Free Entry' },
  { id: 7, title: 'Machine Learning Workshop', category: 'workshop', date: '2025-05-02', time: '10:00', venue: 'Lab 5, CS Building', seats: 30, rsvps: 0, description: 'Dive into ML fundamentals with Python and scikit-learn. Covers linear regression, classification, and neural networks basics. Prior Python knowledge required.', organizer: 'AI Research Group', tag: 'Certificate' },
  { id: 8, title: 'Campus Marathon 2025', category: 'sports', date: '2025-05-05', time: '07:00', venue: 'College Ground', seats: 400, rsvps: 0, description: '5K and 10K categories available. Registration includes a runner\'s kit and breakfast. All fitness levels welcome. Prizes for top 3 in each category.', organizer: 'Sports Committee', tag: 'Registration Required' },
];

// Default notifications
const DEFAULT_NOTIFICATIONS = [
  { id: 1, type: 'event', title: 'New Event Added!', body: 'Tech Symposium 2025 has been added. Seats filling fast!', time: '2 hours ago', read: false, icon: 'calendar-alt' },
  { id: 2, type: 'reminder', title: 'Event Reminder', body: 'Web Development Bootcamp is in 3 days. You\'re registered!', time: '5 hours ago', read: false, icon: 'clock' },
  { id: 3, type: 'broadcast', title: 'Admin Announcement', body: 'Campus library will be open extended hours during exam week.', time: '1 day ago', read: false, icon: 'bullhorn' },
  { id: 4, type: 'rsvp', title: 'RSVP Confirmed', body: 'Your RSVP for Spring Cultural Fest has been confirmed.', time: '2 days ago', read: true, icon: 'check-circle' },
  { id: 5, type: 'event', title: 'Seats Running Low!', body: 'ML Workshop only has 5 seats left. Register now!', time: '3 days ago', read: true, icon: 'exclamation-circle' },
];

// ============================================================
// DATA ACCESS FUNCTIONS
// ============================================================

function initData() {
  if (!localStorage.getItem('cc_users')) {
    localStorage.setItem('cc_users', JSON.stringify(DEFAULT_USERS));
  }
  if (!localStorage.getItem('cc_events')) {
    localStorage.setItem('cc_events', JSON.stringify(DEFAULT_EVENTS));
  }
  if (!localStorage.getItem('cc_notifications')) {
    localStorage.setItem('cc_notifications', JSON.stringify(DEFAULT_NOTIFICATIONS));
  }
  if (!localStorage.getItem('cc_rsvps')) {
    localStorage.setItem('cc_rsvps', JSON.stringify([]));
  }
}

function getUsers() { return JSON.parse(localStorage.getItem('cc_users')) || []; }
function saveUsers(u) { localStorage.setItem('cc_users', JSON.stringify(u)); }

function getEvents() { return JSON.parse(localStorage.getItem('cc_events')) || []; }
function saveEvents(e) { localStorage.setItem('cc_events', JSON.stringify(e)); }

function getNotifications() { return JSON.parse(localStorage.getItem('cc_notifications')) || []; }
function saveNotifications(n) { localStorage.setItem('cc_notifications', JSON.stringify(n)); }

function getRSVPs() { return JSON.parse(localStorage.getItem('cc_rsvps')) || []; }
function saveRSVPs(r) { localStorage.setItem('cc_rsvps', JSON.stringify(r)); }

function getCurrentUser() {
  const u = localStorage.getItem('cc_current_user');
  return u ? JSON.parse(u) : null;
}
function setCurrentUser(u) { localStorage.setItem('cc_current_user', JSON.stringify(u)); }
function clearCurrentUser() { localStorage.removeItem('cc_current_user'); }

// ============================================================
// AUTH GUARD
// ============================================================
function requireAuth(adminOnly = false) {
  const user = getCurrentUser();
  if (!user) { window.location.href = 'index.html'; return null; }
  if (adminOnly && user.role !== 'admin') { window.location.href = 'dashboard.html'; return null; }
  return user;
}

function logout() {
  clearCurrentUser();
  window.location.href = 'index.html';
}

function toggleSidebar() {
  const s = document.getElementById('sidebar');
  s.classList.toggle('open');
}

// Format date
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}
function formatTime(timeStr) {
  const [h, m] = timeStr.split(':');
  const ampm = +h >= 12 ? 'PM' : 'AM';
  const hr = +h % 12 || 12;
  return `${hr}:${m} ${ampm}`;
}
function isPast(dateStr) { return new Date(dateStr + 'T23:59:00') < new Date(); }

// Category color helper
function catClass(cat) {
  const map = { academic: 'academic', cultural: 'cultural', sports: 'sports', workshop: 'workshop', social: 'social' };
  return map[cat] || 'academic';
}

// Notif icon map
function notifIconClass(type) {
  const map = { event: 'event', reminder: 'reminder', broadcast: 'broadcast', rsvp: 'rsvp' };
  return map[type] || 'event';
}
function notifIcon(type) {
  const map = { event: 'calendar-alt', reminder: 'clock', broadcast: 'bullhorn', rsvp: 'check-circle' };
  return map[type] || 'bell';
}

// Add a notification
function addNotification(type, title, body) {
  const notifs = getNotifications();
  notifs.unshift({ id: Date.now(), type, title, body, time: 'Just now', read: false, icon: notifIcon(type) });
  saveNotifications(notifs);
}

// Initialize on every page load
initData();

// dashboard.js
const user = requireAuth();
if (!user) throw new Error('Not auth');

// Setup greeting
const hour = new Date().getHours();
document.getElementById('timeGreeting').textContent =
  hour < 12 ? 'morning' : hour < 17 ? 'afternoon' : 'evening';
document.getElementById('userName').textContent = user.name.split(' ')[0];
document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
document.getElementById('userAvatar').textContent = user.name[0].toUpperCase();

// Stats
const events = getEvents();
const rsvps = getRSVPs().filter(r => r.userId === user.id);
const upcoming = events.filter(e => !isPast(e.date));
const notifs = getNotifications().filter(n => !n.read);

document.getElementById('totalEvents').textContent = events.length;
document.getElementById('myRSVPs').textContent = rsvps.length;
document.getElementById('upcomingCount').textContent = upcoming.length;
document.getElementById('notifCount').textContent = notifs.length;
const badge = document.getElementById('notifBadge');
if (badge) badge.textContent = notifs.length;

// Render upcoming events (up to 6)
function renderUpcoming() {
  const grid = document.getElementById('upcomingEventsGrid');
  const myRSVPIds = getRSVPs().filter(r => r.userId === user.id).map(r => r.eventId);
  const list = upcoming.slice(0, 6);

  if (!list.length) {
    grid.innerHTML = '<p style="color:var(--text-muted)">No upcoming events.</p>';
    return;
  }

  grid.innerHTML = list.map(e => buildEventCard(e, myRSVPIds)).join('');
}

function buildEventCard(e, myRSVPIds) {
  const cat = catClass(e.category);
  const full = e.rsvps >= e.seats;
  const hasRSVP = myRSVPIds.includes(e.id);
  const pct = Math.min(100, Math.round((e.rsvps / e.seats) * 100));

  let btnHtml;
  if (hasRSVP) {
    btnHtml = `<button class="rsvp-btn rsvp-done" onclick="cancelRSVP(${e.id}, event)"><i class="fas fa-check"></i> Going</button>`;
  } else if (full) {
    btnHtml = `<button class="rsvp-btn rsvp-full" disabled>Full</button>`;
  } else {
    btnHtml = `<button class="rsvp-btn rsvp-yes" onclick="doRSVP(${e.id}, event)">RSVP</button>`;
  }

  return `
    <div class="event-card">
      <div class="event-banner ${cat}"></div>
      <div class="event-body">
        <div class="event-meta">
          <span class="event-cat ${cat}">${e.category}</span>
          <span class="event-tag">${e.tag || ''}</span>
        </div>
        <div class="event-title">${e.title}</div>
        <div class="event-info">
          <span><i class="fas fa-calendar"></i> ${formatDate(e.date)}</span>
          <span><i class="fas fa-clock"></i> ${formatTime(e.time)}</span>
          <span><i class="fas fa-map-marker-alt"></i> ${e.venue}</span>
        </div>
        <div class="event-footer">
          <div class="seats-bar-wrap">
            <div class="seats-label">${e.rsvps}/${e.seats} registered</div>
            <div class="seats-bar"><div class="seats-fill" style="width:${pct}%"></div></div>
          </div>
          ${btnHtml}
        </div>
      </div>
    </div>`;
}

function doRSVP(eventId, ev) {
  ev.stopPropagation();
  const events = getEvents();
  const event = events.find(e => e.id === eventId);
  if (!event || event.rsvps >= event.seats) return;
  event.rsvps++;
  saveEvents(events);
  const rsvps = getRSVPs();
  rsvps.push({ userId: user.id, eventId, timestamp: new Date().toISOString() });
  saveRSVPs(rsvps);
  addNotification('rsvp', 'RSVP Confirmed!', `You're registered for "${event.title}"`);
  renderUpcoming();
  document.getElementById('myRSVPs').textContent = getRSVPs().filter(r => r.userId === user.id).length;
}

function cancelRSVP(eventId, ev) {
  ev.stopPropagation();
  if (!confirm('Cancel your RSVP for this event?')) return;
  const events = getEvents();
  const event = events.find(e => e.id === eventId);
  if (event && event.rsvps > 0) { event.rsvps--; saveEvents(events); }
  const rsvps = getRSVPs().filter(r => !(r.userId === user.id && r.eventId === eventId));
  saveRSVPs(rsvps);
  renderUpcoming();
  document.getElementById('myRSVPs').textContent = getRSVPs().filter(r => r.userId === user.id).length;
}

// Render recent notifications
function renderNotifications() {
  const list = document.getElementById('recentNotifList');
  const notifs = getNotifications().slice(0, 4);
  list.innerHTML = notifs.map(n => `
    <div class="notif-item ${n.read ? '' : 'unread'}">
      <div class="notif-icon ${notifIconClass(n.type)}"><i class="fas fa-${notifIcon(n.type)}"></i></div>
      <div class="notif-content">
        <div class="notif-title">${n.title}</div>
        <div class="notif-body">${n.body}</div>
      </div>
      <div class="notif-time">${n.time}</div>
    </div>`).join('');
}

renderUpcoming();
renderNotifications();

  </script>
</body></html>
